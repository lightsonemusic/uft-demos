<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Russell Alignment Portal · UFT 3-System Coherency</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Georgia', serif;
  background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
  color: #c8d8e8;
  min-height: 100vh;
  padding: 20px;
}
.container {
  max-width: 1400px;
  margin: 0 auto;
}
h1 {
  text-align: center;
  font-size: 32px;
  letter-spacing: 8px;
  color: #8aabcc;
  margin-bottom: 8px;
  font-weight: 300;
  text-transform: uppercase;
}
.subtitle {
  text-align: center;
  font-size: 14px;
  color: #3a5060;
  margin-bottom: 32px;
  letter-spacing: 2px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 20px;
  margin-bottom: 40px;
}

.cycle-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(100,150,200,0.3);
  border-radius: 12px;
  padding: 24px;
  backdrop-filter: blur(10px);
}
.cycle-card h2 {
  font-size: 14px;
  letter-spacing: 3px;
  color: #6090c0;
  margin-bottom: 16px;
  text-transform: uppercase;
}

.cycle-value {
  font-size: 48px;
  font-weight: bold;
  letter-spacing: 2px;
  margin-bottom: 8px;
  font-variant-numeric: tabular-nums;
}
.lunar .cycle-value { color: #60a5fa; }
.solar .cycle-value { color: #facc15; }
.russell .cycle-value { color: #a78bfa; }

.cycle-note {
  font-size: 18px;
  color: #9090a0;
  margin-bottom: 12px;
}

.cycle-progress {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.1);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 12px;
}
.cycle-progress-bar {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}
.lunar .cycle-progress-bar { background: linear-gradient(90deg, #60a5fa, #0ea5e9); }
.solar .cycle-progress-bar { background: linear-gradient(90deg, #facc15, #f59e0b); }
.russell .cycle-progress-bar { background: linear-gradient(90deg, #a78bfa, #8b5cf6); }

.cycle-detail {
  font-size: 12px;
  color: #6090c0;
  line-height: 1.6;
}

/* Alignment Panel */
.alignment-section {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(100,150,200,0.3);
  border-radius: 12px;
  padding: 32px;
  margin-bottom: 40px;
}
.alignment-header {
  font-size: 14px;
  letter-spacing: 3px;
  color: #6090c0;
  margin-bottom: 24px;
  text-transform: uppercase;
}

.alignment-index {
  display: flex;
  align-items: center;
  margin-bottom: 32px;
}
.alignment-index-value {
  font-size: 64px;
  font-weight: bold;
  color: #00ff88;
  margin-right: 24px;
  min-width: 100px;
  font-variant-numeric: tabular-nums;
}
.alignment-index-label {
  font-size: 14px;
  color: #6090c0;
  line-height: 1.8;
}

.alignment-bar {
  width: 100%;
  height: 12px;
  background: rgba(255,255,255,0.1);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 24px;
}
.alignment-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #00ff88, #00dd88, #00aa88);
  border-radius: 6px;
  transition: width 0.8s ease;
}

.three-frequencies {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
.freq-box {
  background: rgba(0,0,0,0.4);
  border-left: 4px solid;
  padding: 16px;
  border-radius: 8px;
}
.freq-box.lunar { border-left-color: #60a5fa; }
.freq-box.solar { border-left-color: #facc15; }
.freq-box.russell { border-left-color: #a78bfa; }

.freq-label {
  font-size: 11px;
  letter-spacing: 2px;
  color: #6090c0;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.freq-value {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 6px;
  font-variant-numeric: tabular-nums;
}
.lunar .freq-value { color: #60a5fa; }
.solar .freq-value { color: #facc15; }
.russell .freq-value { color: #a78bfa; }

.freq-relation {
  font-size: 10px;
  color: #4090a0;
}

/* Polyphonic Tone Button */
.tone-button {
  width: 100%;
  padding: 16px;
  background: rgba(0,255,136,0.1);
  border: 2px solid #00ff88;
  border-radius: 8px;
  color: #00ff88;
  font-size: 13px;
  letter-spacing: 2px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.3s;
  margin-bottom: 24px;
}
.tone-button:hover {
  background: rgba(0,255,136,0.2);
  box-shadow: 0 0 16px rgba(0,255,136,0.4);
}
.tone-button:active {
  transform: scale(0.98);
}

/* Canvas for phase visualization */
canvas {
  width: 100%;
  height: 200px;
  border: 1px solid rgba(100,150,200,0.2);
  border-radius: 8px;
  background: rgba(0,0,0,0.2);
}
</style>
</head>
<body>

<div class="container">

  <h1>⚛️ Russell Alignment Portal</h1>
  <div class="subtitle">Lunar (13) × Solar (12) × Russell (10) · Real-Time 3-System Coherency</div>

  <!-- THREE-CYCLE GRID -->
  <div class="grid">
    
    <!-- LUNAR CYCLE -->
    <div class="cycle-card lunar">
      <h2>🌙 Lunar Cycle</h2>
      <div class="cycle-value" id="lunarFreq">—</div>
      <div class="cycle-note" id="lunarNote">—</div>
      <div class="cycle-progress">
        <div class="cycle-progress-bar" id="lunarBar"></div>
      </div>
      <div class="cycle-detail" id="lunarDetail">—</div>
    </div>

    <!-- SOLAR CYCLE -->
    <div class="cycle-card solar">
      <h2>☀️ Solar Cycle</h2>
      <div class="cycle-value" id="solarFreq">—</div>
      <div class="cycle-note" id="solarNote">—</div>
      <div class="cycle-progress">
        <div class="cycle-progress-bar" id="solarBar"></div>
      </div>
      <div class="cycle-detail" id="solarDetail">—</div>
    </div>

    <!-- RUSSELL OCTAVE -->
    <div class="cycle-card russell">
      <h2>⚛️ Russell Octave</h2>
      <div class="cycle-value" id="russellFreq">—</div>
      <div class="cycle-note" id="russellNote">—</div>
      <div class="cycle-progress">
        <div class="cycle-progress-bar" id="russellBar"></div>
      </div>
      <div class="cycle-detail" id="russellDetail">—</div>
    </div>

  </div>

  <!-- ALIGNMENT ANALYSIS -->
  <div class="alignment-section">
    <div class="alignment-header">⭐ Coherency Alignment Index</div>
    
    <div class="alignment-index">
      <div class="alignment-index-value" id="alignmentIndex">—</div>
      <div class="alignment-index-label" id="alignmentStatus">—</div>
    </div>

    <div class="alignment-bar">
      <div class="alignment-bar-fill" id="alignmentBarFill"></div>
    </div>

    <!-- THREE FREQUENCIES -->
    <div class="three-frequencies">
      <div class="freq-box lunar">
        <div class="freq-label">Lunar</div>
        <div class="freq-value" id="f1">—</div>
        <div class="freq-relation" id="r1">—</div>
      </div>
      <div class="freq-box solar">
        <div class="freq-label">Solar</div>
        <div class="freq-value" id="f2">—</div>
        <div class="freq-relation" id="r2">—</div>
      </div>
      <div class="freq-box russell">
        <div class="freq-label">Russell</div>
        <div class="freq-value" id="f3">—</div>
        <div class="freq-relation" id="r3">—</div>
      </div>
    </div>

    <!-- POLYPHONIC BUTTON -->
    <button class="tone-button" id="toneBtn">▶ Play Alignment Tones</button>

    <!-- PHASE VISUALIZATION -->
    <canvas id="phaseCanvas"></canvas>
  </div>

</div>

<script>
// ────────────────────────────────────────────────────────────────────────────
// UFT CONSTANTS & HELPERS
// ────────────────────────────────────────────────────────────────────────────

const ROOT_432    = 256.0000;
const SQRT2       = Math.sqrt(2);
const PHI         = (1 + Math.sqrt(5)) / 2;
const NOTE_NAMES  = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function getFrequency(note, octave, tuning='432') {
  const roots = { '440': 261.6256, '432': 256.0000, 'moon': 210.4186 };
  const root = roots[tuning];
  return root * Math.pow(2, octave) * Math.pow(2, note / 12);
}

// ────────────────────────────────────────────────────────────────────────────
// LUNAR CALENDAR (13 months, 28 days each = 364 days)
// ────────────────────────────────────────────────────────────────────────────

function getLunarState(date = new Date()) {
  const anchor = new Date('2026-01-01');
  const msPerDay = 86400000;
  const daysSinceAnchor = (date - anchor) / msPerDay;
  const lunarCycleLength = 28;
  const lunarCycles = 13;
  const totalDays = lunarCycleLength * lunarCycles; // 364
  
  const dayInCycle = ((daysSinceAnchor % totalDays) + totalDays) % totalDays;
  const monthIndex = Math.floor(dayInCycle / lunarCycleLength);
  const dayInMonth = dayInCycle % lunarCycleLength;
  
  const pc = monthIndex % 13;
  const freq = getFrequency(pc, 0, 'moon');
  const note = NOTE_NAMES[pc % 12];
  const progress = dayInCycle / totalDays;
  
  return { pc, freq, note, progress, dayInMonth, monthIndex };
}

// ────────────────────────────────────────────────────────────────────────────
// SOLAR CALENDAR (12 months, ~30.4 days each = 365.25 days)
// ────────────────────────────────────────────────────────────────────────────

function getSolarState(date = new Date()) {
  const anchor = new Date('2026-03-20'); // Vernal equinox
  const msPerDay = 86400000;
  const daysSinceAnchor = (date - anchor) / msPerDay;
  const solarCycleLength = 365.25;
  
  const dayInCycle = ((daysSinceAnchor % solarCycleLength) + solarCycleLength) % solarCycleLength;
  const monthIndex = Math.floor(dayInCycle / 30.4375);
  const dayInMonth = dayInCycle % 30.4375;
  
  const pc = monthIndex % 12;
  const freq = getFrequency(pc, 1, '432');
  const note = NOTE_NAMES[pc];
  const progress = dayInCycle / solarCycleLength;
  
  const zodiac = ['Aries','Taurus','Gemini','Cancer','Leo','Virgo','Libra','Scorpio','Sagittarius','Capricorn','Aquarius','Pisces'][pc];
  
  return { pc, freq, note, progress, dayInMonth, monthIndex, zodiac };
}

// ────────────────────────────────────────────────────────────────────────────
// RUSSELL OCTAVES (10 octaves, each ~36.5 days)
// ────────────────────────────────────────────────────────────────────────────

function getRussellState(date = new Date()) {
  const anchor = new Date('2026-01-01');
  const msPerDay = 86400000;
  const daysSinceAnchor = (date - anchor) / msPerDay;
  const octaveCycleLength = 36.5;
  const totalOctaves = 10;
  const totalDays = octaveCycleLength * totalOctaves; // 365
  
  const dayInCycle = ((daysSinceAnchor % totalDays) + totalDays) % totalDays;
  const octave = Math.floor(dayInCycle / octaveCycleLength) + 1; // 1–10
  const dayInOctave = dayInCycle % octaveCycleLength;
  
  // Russell octave root frequencies (octave 1 = 256 Hz × 2^(octave-1))
  const freq = 256 * Math.pow(2, octave - 1);
  const progress = dayInOctave / octaveCycleLength;
  
  const cycleName = octave === 10 ? 'Omegaron' : `Octave ${octave}`;
  
  return { octave, freq, progress, dayInOctave, cycleName };
}

// ────────────────────────────────────────────────────────────────────────────
// ALIGNMENT INDEX (0–1 scale, where 1 = perfect coherency)
// ────────────────────────────────────────────────────────────────────────────

function calculateAlignmentIndex(lunar, solar, russell) {
  // Phase alignment (0–1 for each, then average)
  const lunarPhase = lunar.progress;
  const solarPhase = solar.progress;
  const russellPhase = russell.progress;
  
  // Phase difference variance (lower variance = better alignment)
  const phases = [lunarPhase, solarPhase, russellPhase];
  const meanPhase = phases.reduce((a,b) => a+b) / 3;
  const variance = phases.reduce((sum, p) => sum + Math.pow(p - meanPhase, 2), 0) / 3;
  const phaseAlignment = 1 - Math.min(variance * 4, 1); // Scale to 0–1
  
  // Frequency harmonic relationship
  const f_combined = (lunar.freq + solar.freq + russell.freq) / 3;
  const f_variance = Math.abs(lunar.freq - f_combined) + Math.abs(solar.freq - f_combined) + Math.abs(russell.freq - f_combined);
  const frequencyAlignment = Math.exp(-f_variance / 100000); // Exponential decay
  
  // Combined index
  return (phaseAlignment * 0.6 + frequencyAlignment * 0.4);
}

// ────────────────────────────────────────────────────────────────────────────
// UPDATE DISPLAY
// ────────────────────────────────────────────────────────────────────────────

function update() {
  const now = new Date();
  const lunar = getLunarState(now);
  const solar = getSolarState(now);
  const russell = getRussellState(now);
  
  // Update Lunar
  document.getElementById('lunarFreq').textContent = lunar.freq.toFixed(2);
  document.getElementById('lunarNote').textContent = lunar.note;
  document.getElementById('lunarBar').style.width = (lunar.progress * 100) + '%';
  document.getElementById('lunarDetail').textContent = `Month ${lunar.monthIndex + 1}/13, Day ${Math.floor(lunar.dayInMonth) + 1}/28`;
  
  // Update Solar
  document.getElementById('solarFreq').textContent = solar.freq.toFixed(2);
  document.getElementById('solarNote').textContent = solar.zodiac;
  document.getElementById('solarBar').style.width = (solar.progress * 100) + '%';
  document.getElementById('solarDetail').textContent = `${solar.zodiac}, Day ${Math.floor(solar.dayInMonth) + 1}/30`;
  
  // Update Russell
  document.getElementById('russellFreq').textContent = russell.freq.toFixed(0);
  document.getElementById('russellNote').textContent = russell.cycleName;
  document.getElementById('russellBar').style.width = (russell.progress * 100) + '%';
  document.getElementById('russellDetail').textContent = `${russell.cycleName}, Day ${Math.floor(russell.dayInOctave) + 1}/36`;
  
  // Alignment Index
  const alignment = calculateAlignmentIndex(lunar, solar, russell);
  document.getElementById('alignmentIndex').textContent = alignment.toFixed(3);
  document.getElementById('alignmentBarFill').style.width = (alignment * 100) + '%';
  
  // Status text
  let status = 'Moderate alignment';
  if (alignment > 0.85) status = '🌟 PEAK COHERENCY — Rare alignment window!';
  else if (alignment > 0.70) status = '✦ High coherency — Optimal conditions';
  else if (alignment > 0.50) status = '◇ Balanced alignment — Favorable';
  else if (alignment > 0.30) status = '△ Developing — Low coherency';
  else status = '░ Scattered — Minimal alignment';
  
  document.getElementById('alignmentStatus').textContent = status;
  
  // Three frequencies
  document.getElementById('f1').textContent = lunar.freq.toFixed(1) + ' Hz';
  document.getElementById('f2').textContent = solar.freq.toFixed(1) + ' Hz';
  document.getElementById('f3').textContent = russell.freq.toFixed(0) + ' Hz';
  
  document.getElementById('r1').textContent = 'Lunar · ' + lunar.note + ' (Moon tuning)';
  document.getElementById('r2').textContent = 'Solar · ' + solar.zodiac + ' (432 Hz)';
  document.getElementById('r3').textContent = 'Russell · Octave ' + russell.octave;
  
  // Draw phase visualization
  drawPhases(lunar.progress, solar.progress, russell.progress);
}

// ────────────────────────────────────────────────────────────────────────────
// PHASE VISUALIZATION CANVAS
// ────────────────────────────────────────────────────────────────────────────

function drawPhases(lunarP, solarP, russellP) {
  const canvas = document.getElementById('phaseCanvas');
  const ctx = canvas.getContext('2d');
  const w = canvas.offsetWidth;
  const h = canvas.offsetHeight;
  canvas.width = w;
  canvas.height = h;
  
  ctx.fillStyle = 'rgba(10,14,39,0.8)';
  ctx.fillRect(0, 0, w, h);
  
  // Draw three sine waves representing phase
  const waves = [
    { progress: lunarP, color: '#60a5fa', y: h * 0.25, label: 'Lunar' },
    { progress: solarP, color: '#facc15', y: h * 0.5, label: 'Solar' },
    { progress: russellP, color: '#a78bfa', y: h * 0.75, label: 'Russell' }
  ];
  
  for (let wave of waves) {
    ctx.strokeStyle = wave.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    
    for (let x = 0; x < w; x++) {
      const normalizedX = x / w;
      const phase = wave.progress * Math.PI * 2;
      const sine = Math.sin(normalizedX * Math.PI * 2 + phase);
      const y = wave.y + sine * (h * 0.15);
      
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    
    // Label
    ctx.fillStyle = wave.color;
    ctx.font = '11px Georgia';
    ctx.fillText(wave.label, 8, wave.y - 30);
  }
}

// ────────────────────────────────────────────────────────────────────────────
// POLYPHONIC TONE PLAYBACK
// ────────────────────────────────────────────────────────────────────────────

let audioContext = null;
let isPlaying = false;

document.getElementById('toneBtn').addEventListener('click', async () => {
  if (isPlaying) return;
  
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
  
  isPlaying = true;
  const now = new Date();
  const lunar = getLunarState(now);
  const solar = getSolarState(now);
  const russell = getRussellState(now);
  
  const startTime = audioContext.currentTime;
  const duration = 3;
  
  // Create three oscillators
  const oscillators = [];
  const gainNodes = [];
  
  for (let freq of [lunar.freq, solar.freq, Math.min(russell.freq, 20000)]) { // Cap Russell freq for audio
    const osc = audioContext.createOscillator();
    const gain = audioContext.createGain();
    
    osc.frequency.value = freq;
    osc.type = 'sine';
    
    gain.gain.setValueAtTime(0.1, startTime);
    gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
    
    osc.connect(gain);
    gain.connect(audioContext.destination);
    
    osc.start(startTime);
    osc.stop(startTime + duration);
    
    oscillators.push(osc);
    gainNodes.push(gain);
  }
  
  setTimeout(() => { isPlaying = false; }, duration * 1000);
});

// ────────────────────────────────────────────────────────────────────────────
// MAIN LOOP
// ────────────────────────────────────────────────────────────────────────────

update();
setInterval(update, 1000);
</script>

</body>
