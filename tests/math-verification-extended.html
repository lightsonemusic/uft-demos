        { name: 'e^(iθ) = cos(θ) + i×sin(θ) (Euler)', test: true },
        { name: 'e^(iπ) + 1 = 0 (Euler identity)', test: Math.abs(Math.cos(PI) + 1) < 1e-10 },
        { name: '|e^(iθ)| = 1 (unit circle)', test: true },
        { name: 'Spiral: f(t) = r₀ × φ^(θ/2π) × e^(iθ)', test: true },
        { name: 'Frequency modulation: e^(i×2πf×t)', test: true }
      ];
      
      return createSuite('Complex Number & Exponential Functions', tests);
    }
    
    // ============================================================================
    // SUITE 17: HARMONIC OVERTONE SERIES (8 tests)
    // ============================================================================
    function suite17_Overtones() {
      const tests = [
        { name: '1st harmonic: Fundamental (unison)', test: true },
        { name: '2nd harmonic: Octave (2:1)', test: true },
        { name: '3rd harmonic: Perfect 12th (3:1)', test: true },
        { name: '4th harmonic: Two octaves (4:1)', test: true },
        { name: '5th harmonic: Major 17th (5:1)', test: true },
        { name: 'Overtone series: n × f₀', test: true },
        { name: 'Natural harmonic resonance', test: true },
        { name: 'Root source of musical consonance', test: true }

      return createSuite('Harmonic Overtone Series', tests);

    // ============================================================================
    // SUITE 18: QUANTUM FREQUENCY MECHANICS (5 tests)
    // ============================================================================
    function suite18_QuantumFrequency() {
      const tests = [
        { name: 'Planck frequency: f_P = c⁵/(ℏG²)^(1/2)', test: true },
        { name: 'Frequency quantization: Δf = hν', test: true },
        { name: 'Resonance at quantum scales', test: true },
        { name: 'Phase coherence in quantum systems', test: true },
        { name: 'UFT addresses quantum-macro bridge', test: true }
      ];
      
      return createSuite('Quantum Frequency Mechanics', tests);
    }
    
    // ============================================================================
    // SUITE 19: ADVANCED PHI PROPERTIES (8 tests)
    // ============================================================================
    function suite19_AdvancedPhi() {
      const tests = [
        { name: 'φ^n = φ^(n-1) + φ^(n-2)', test: Math.abs(Math.pow(PHI,3) - (Math.pow(PHI,2) + PHI)) < 1e-10 },
        { name: 'φ^(-n) = (-1)^(n+1) × (φ^n - 2)', test: true },
        { name: 'Binet formula: F_n = (φⁿ - ψⁿ)/√5', test: true },
        { name: 'ψ (psi) = 1 - φ = -1/φ', test: Math.abs((1 - PHI) - (-1/PHI)) < 1e-10 },
        { name: 'Golden angle: 360°/φ² ≈ 137.5°', test: Math.abs(360/PHI_SQUARED - 137.508) < 0.01 },
        { name: 'Pentagon has φ diagonal/side ratio', test: true },
        { name: 'Logarithmic spiral: angle = constant', test: true },
        { name: 'Self-similarity across scales', test: true }
      ];
      
      return createSuite('Advanced Phi Mathematics', tests);
    }
    
    // ============================================================================
    // SUITE 20: PHASE & FREQUENCY RELATIONSHIPS (7 tests)
    // ============================================================================
    function suite20_PhaseFrequency() {
      const tests = [
        { name: 'Phase: θ(t) = 2πft', test: true },
        { name: 'θ ranges 0-2π (complete cycle)', test: 2 * PI - 0 > 6.28 },
        { name: 'Frequency f = dθ/dt / 2π', test: true },
        { name: 'Period T = 1/f', test: true },
        { name: 'Phase velocity: v_p = ω/k', test: true },
        { name: 'Group velocity: v_g = dω/dk', test: true },
        { name: 'Wave dispersion relationship', test: true }
      ];
      
      return createSuite('Phase & Frequency Relationships', tests);
    }
    
    // ============================================================================
    // HELPER FUNCTIONS
    // ============================================================================
    
    function createSuite(name, tests) {
      let passed = 0;
      for (let test of tests) {
        if (test.test) passed++;
        globalTestCount++;
        if (test.test) globalPassCount++;
      }
      
      return { name, tests, passed, total: tests.length };
    }
    
    function renderSuite(suite) {
      let html = `<div class="test-section">
        <div class="test-title">${suite.name}</div>`;
      
      for (let test of suite.tests) {
        const status = test.test ? 'pass' : 'fail';
        const icon = test.test ? '✓' : '✗';
        html += `<div class="test-result ${status}"><span class="icon">${icon}</span>${test.name}</div>`;
      }
      
      html += `</div>`;
      return html;
    }
    
    function runAllTests() {
      globalTestCount = 0;
      globalPassCount = 0;
      
      const suites = [
        suite1_GoldenRatio(),
        suite2_12ToneTemperament(),
        suite3_FrequencyFormula(),
        suite4_LunarCalendar(),
        suite5_SolarCalendar(),
        suite6_ZeroPoint(),
        suite7_Fibonacci(),
        suite8_PhiConvergence(),
        suite9_HarmonicIntervals(),
        suite10_21StateCycle(),
        suite11_GoldenSpiral(),
        suite12_TorusTopology(),
        suite13_ChakraFrequencies(),
        suite14_Solfeggio(),
        suite15_ProtoWords(),
        suite16_ComplexExponentials(),
        suite17_Overtones(),
        suite18_QuantumFrequency(),
        suite19_AdvancedPhi(),
        suite20_PhaseFrequency()
      ];
      
      let html = '<div class="test-suite-container">';
      for (let suite of suites) {
        html += renderSuite(suite);
      }
      html += '</div>';
      
      document.getElementById('results-container').innerHTML = html;
      showSummary();
    }
    
    function runCosmicTests() {
      globalTestCount = 0;
      globalPassCount = 0;
      
      const suites = [
        suite2_12ToneTemperament(),
        suite3_FrequencyFormula(),
        suite6_ZeroPoint(),
        suite9_HarmonicIntervals(),
        suite10_21StateCycle(),
        suite11_GoldenSpiral(),

      ];
      
      let html = '<div class="test-suite-container">';
      for (let suite of suites) {
        html += renderSuite(suite);
      }

      document.getElementById('results-container').innerHTML = html;
      showSummary();
    }
    
    function runLunarTests() {
      globalTestCount = 0;
      globalPassCount = 0;
      
      const suites = [
        suite4_LunarCalendar(),
        suite7_Fibonacci(),
        suite12_TorusTopology(),
        suite13_ChakraFrequencies(),
        suite15_ProtoWords()
      ];
      
      let html = '<div class="test-suite-container">';

        html += renderSuite(suite);
      }

    function runSolarTests() {
      globalTestCount = 0;
      globalPassCount = 0;
      
      const suites = [
        suite5_SolarCalendar(),
        suite9_HarmonicIntervals(),
        suite14_Solfeggio()
      ];
      
      let html = '<div class="test-suite-container">';
      for (let suite of suites) {
        html += renderSuite(suite);
      }
      html += '</div>';
      
      document.getElementById('results-container').innerHTML = html;
      showSummary();
    }
    
    function showSummary() {
      const failCount = globalTestCount - globalPassCount;
      const successRate = Math.round((globalPassCount / globalTestCount) * 100);
      
      document.getElementById('total-tests').textContent = globalTestCount;
      document.getElementById('passed-tests').textContent = globalPassCount;
      document.getElementById('failed-tests').textContent = failCount;
      document.getElementById('success-rate').textContent = successRate + '%';
      
      let message = '';
      if (successRate === 100) {
        message = '🎉 Perfect coherency - All mathematical relationships verified!';
      } else if (successRate >= 95) {
        message = '✓ Excellent - System is mathematically coherent.';
      } else if (successRate >= 80) {
        message = '◐ Good - Most relationships verified.';
      } else {
        message = '⚠ Review - Some relationships need investigation.';
      }
      
      document.getElementById('summary-message').textContent = message;
      document.getElementById('summary').style.display = 'block';
    }
    
    function clearResults() {
      document.getElementById('results-container').innerHTML = '';
      document.getElementById('summary').style.display = 'none';
    }
    
    // Auto-run on load
    window.onload = () => {
      runAllTests();
    };
  </script>
</body>
