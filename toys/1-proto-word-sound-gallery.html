<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proto-Word Sound Gallery</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Monaco', monospace;
      background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
      color: #e8f4f8;
      padding: 40px 20px;
      min-height: 100vh;
    }
    .container { max-width: 900px; margin: 0 auto; }
    h1 {
      text-align: center;
      font-size: 28px;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #1abc9c, #f39c12, #8e44ad);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle { text-align: center; color: #888; font-size: 12px; margin-bottom: 30px; }
    
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }
    
    .proto-word-btn {
      aspect-ratio: 1;
      border: 2px solid;
      border-radius: 8px;
      background: rgba(255,255,255,0.02);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s;
      padding: 10px;
      text-align: center;
    }
    
    .proto-word-btn:hover {
      background: rgba(255,255,255,0.08);
      transform: scale(1.05);
    }
    
    .proto-word-btn.active {
      background: rgba(255,255,255,0.15);
      box-shadow: 0 0 15px currentColor;
    }
    
    .word { font-size: 24px; font-weight: bold; }
    .freq { font-size: 11px; color: #aaa; }
    .planet { font-size: 10px; color: #666; }
    
    .info-panel {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
    }
    
    .info-panel h2 { font-size: 13px; color: #888; margin-bottom: 8px; }
    .info-content {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      font-size: 11px;
    }
    .info-row { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .info-label { color: #666; }
    .info-value { font-weight: bold; }
    
    .controls {
      text-align: center;
      margin-top: 20px;
    }
    
    button {
      padding: 8px 16px;
      margin: 0 4px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.05);
      color: #e8f4f8;
      cursor: pointer;
      font-size: 11px;
    }
    
    button:hover {
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 Proto-Word Sound Gallery</h1>
    <p class="subtitle">Click any proto-word to hear its cosmic frequency</p>
    
    <div class="gallery" id="gallery"></div>
    
    <div class="info-panel">
      <h2>Current Proto-Word Info</h2>
      <div class="info-content" id="infoContent">
        <div class="info-row"><span class="info-label">Select a proto-word to start</span></div>
      </div>
    </div>
    
    <div class="controls">
      <button onclick="playAll()">▶ Play All (sequence)</button>
      <button onclick="stopAll()">■ Stop</button>
    </div>
  </div>

  <script>
    const PROTO_WORDS = [
      { word: 'AH', freq: 210.42, planet: 'Moon', color: '#1abc9c', significance: 'First breath' },
      { word: 'SA', freq: 222.93, planet: 'Mercury', color: '#2ecc71', significance: 'The bridge' },
      { word: 'LA', freq: 236.19, planet: 'Venus', color: '#3498db', significance: 'Proportion' },
      { word: 'RA', freq: 250.23, planet: 'Sun', color: '#f39c12', significance: 'Fire · Light' },
      { word: 'DA', freq: 265.11, planet: 'Mars', color: '#e74c3c', significance: 'Will · Surge' },
      { word: 'HA', freq: 280.88, planet: 'Jupiter', color: '#9b59b6', significance: 'Harmony' },
      { word: 'NA', freq: 297.58, planet: 'Zero Point', color: '#ffffff', significance: 'Silence' },
      { word: 'OM', freq: 334.02, planet: 'Ophiuchus', color: '#36d9b8', significance: 'Threshold' },
      { word: 'TAO', freq: 420.84, planet: 'Yew', color: '#ecf0f1', significance: 'Full cycle' }
    ];

    let audioContext, currentOscillators = [];

    function buildGallery() {
      const gallery = document.getElementById('gallery');
      PROTO_WORDS.forEach((pw, i) => {
        const btn = document.createElement('button');
        btn.className = 'proto-word-btn';
        btn.style.color = pw.color;
        btn.style.borderColor = pw.color;
        btn.innerHTML = `
          <div class="word">${pw.word}</div>
          <div class="freq">${pw.freq} Hz</div>
          <div class="planet">${pw.planet}</div>
        `;
        btn.onclick = () => playWord(pw, btn);
        gallery.appendChild(btn);
      });
    }

    function playWord(protoWord, btn) {
      if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
      if (audioContext.state === 'suspended') audioContext.resume();
      
      stopAll();
      
      // Mark as active
      document.querySelectorAll('.proto-word-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      
      // Update info
      updateInfo(protoWord);
      
      // Play sound (sine wave)
      const gain = audioContext.createGain();
      gain.gain.setValueAtTime(0.2, audioContext.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 3);
      gain.connect(audioContext.destination);
      
      const osc = audioContext.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(protoWord.freq, audioContext.currentTime);
      osc.connect(gain);
      osc.start();
      osc.stop(audioContext.currentTime + 3);
      
      currentOscillators.push(osc);
    }

    function updateInfo(protoWord) {
      const info = document.getElementById('infoContent');
      info.innerHTML = `
        <div class="info-row">
          <span class="info-label">Proto-Word:</span>
          <span class="info-value" style="color:${protoWord.color};">${protoWord.word}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Frequency:</span>
          <span class="info-value">${protoWord.freq} Hz</span>
        </div>
        <div class="info-row">
          <span class="info-label">Planet:</span>
          <span class="info-value">${protoWord.planet}</span>
        </div>
        <div class="info-row">
          <span class="info-label">Significance:</span>
          <span class="info-value">${protoWord.significance}</span>
        </div>
      `;
    }

    function stopAll() {
      currentOscillators.forEach(osc => { try { osc.stop(); } catch(e) {} });
      currentOscillators = [];
      document.querySelectorAll('.proto-word-btn').forEach(b => b.classList.remove('active'));
    }

    function playAll() {
      if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
      if (audioContext.state === 'suspended') audioContext.resume();
      
      stopAll();
      
      let delay = 0;
      PROTO_WORDS.forEach((pw, i) => {
        setTimeout(() => {
          const gain = audioContext.createGain();
          gain.gain.setValueAtTime(0.15, audioContext.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 1.5);
          gain.connect(audioContext.destination);
          
          const osc = audioContext.createOscillator();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(pw.freq, audioContext.currentTime);
          osc.connect(gain);
          osc.start();
          osc.stop(audioContext.currentTime + 1.5);
          
          currentOscillators.push(osc);
          updateInfo(pw);
        }, delay);
        delay += 700;
      });
    }

    buildGallery();
  </script>
</body>
</html>
